apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-apd
  labels:
    type-one: blue
spec:
  replicas: 7
  selector:
    matchLabels:
      type-one: blue
  template:
    metadata:
      labels:
        type-one: blue
        version: v1
    spec:
      containers:
      - name: blue-container
        image: kodekloud/webapp-color:v1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: green-apd
  labels:
    type-two: green
spec:
  replicas: 3
  selector:
    matchLabels:
      type-two: green
  template:
    metadata:
      labels:
        type-two: green
        version: v1
    spec:
      containers:
      - name: green-container
        image: kodekloud/webapp-color:v2
---
apiVersion: v1
kind: Service
metadata:
  name: route-apd-svc
spec:
  type: NodePort
  selector:
    version: v1
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080